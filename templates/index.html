<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="{{SHORT_NAME}}">
    <meta name="theme-color" content="{{COLOR}}">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>{{PROJECT_NAME}} — {{SUBTITLE}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
            font-size: 14px;
            line-height: 1.5;
            padding-bottom: 60px;
        }
        .header {
            background: linear-gradient(135deg, {{COLOR}}, {{COLOR2}});
            color: #fff;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header .sub { font-size: 12px; opacity: 0.8; margin-top: 2px; }
        .quick-links {
            background: #fff;
            margin: 12px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .quick-links .ql-title {
            background: #e74c3c;
            color: #fff;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 14px;
        }
        .quick-links a {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
            text-decoration: none;
            color: {{COLOR}};
            font-weight: 500;
            transition: background 0.15s;
        }
        .quick-links a:last-child { border-bottom: none; }
        .quick-links a:active { background: #f0f7ff; }
        .quick-links .ql-icon { margin-right: 10px; font-size: 18px; }
        .quick-links .ql-label { flex: 1; }
        .quick-links .ql-arrow { color: #ccc; font-size: 16px; }

        .section {
            background: #fff;
            margin: 12px;
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .section-title {
            padding: 10px 16px;
            font-weight: 600;
            font-size: 14px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
        }
        .section-title .toggle { font-size: 12px; opacity: 0.8; }

        .section-body { display: block; }
        .section-body.collapsed { display: none; }

        .subsection {
            border-bottom: 1px solid #f0f0f0;
        }
        .subsection:last-child { border-bottom: none; }
        .subsection-title {
            padding: 8px 16px;
            font-weight: 600;
            font-size: 13px;
            color: #555;
            background: #fafafa;
            border-bottom: 1px solid #f0f0f0;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid #f5f5f5;
            text-decoration: none;
            color: #333;
            transition: background 0.15s;
        }
        .file-item:last-child { border-bottom: none; }
        .file-item:active { background: #f0f7ff; }
        .file-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .file-icon.pdf { background: #e74c3c; }
        .file-icon.xlsx { background: #27ae60; }
        .file-icon.png { background: #3498db; }
        .file-icon.pptx { background: #e67e22; }
        .file-name {
            flex: 1;
            font-size: 13px;
            line-height: 1.3;
            word-break: break-all;
        }
        .file-tag {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 6px;
            flex-shrink: 0;
            font-weight: 600;
        }
        .file-tag.latest { background: #e8f5e9; color: #2e7d32; }
        .file-tag.submitted { background: #fff3e0; color: #e65100; }
        .updated { font-size: 11px; color: #999; text-align: center; padding: 16px; }
        .back-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: {{COLOR}};
            color: #fff;
            border: none;
            font-size: 20px;
            line-height: 44px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 200;
            cursor: pointer;
            opacity: 0.9;
            -webkit-tap-highlight-color: transparent;
        }
        .back-top:active { opacity: 1; }
    </style>
</head>
<body>

<div class="header">
    <h1>{{PROJECT_NAME}}</h1>
    <div class="sub">{{SUBTITLE}}</div>
</div>

{{QUICK_LINKS}}

{{SECTIONS}}

<div class="updated">
    Updated {{UPDATED}}
</div>

<button class="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
function toggle(el) {
    const body = el.nextElementSibling;
    const arrow = el.querySelector('.toggle');
    if (body.classList.contains('collapsed')) {
        body.classList.remove('collapsed');
        arrow.textContent = '▼';
    } else {
        body.classList.add('collapsed');
        arrow.textContent = '▶';
    }
}

// File preview handler
const baseUrl = location.origin + '{{URL_BASE}}';

document.addEventListener('click', function(e) {
    const link = e.target.closest('a.file-item') || e.target.closest('.quick-links a');
    if (!link) return;

    const href = link.getAttribute('href');
    if (!href || href.startsWith('http')) return;

    e.preventDefault();
    const decodedPath = decodeURIComponent(href);
    const rawUrl = baseUrl + decodedPath;
    const ext = href.split('.').pop().toLowerCase();

    if (ext === 'pdf') {
        // PDF: use self-hosted viewer if available, else open directly
        const viewerUrl = baseUrl + 'viewer.html';
        fetch(viewerUrl, {method: 'HEAD'}).then(r => {
            if (r.ok) {
                window.open(viewerUrl + '?file=' + encodeURIComponent(baseUrl + href), '_blank');
            } else {
                window.open(baseUrl + href, '_blank');
            }
        }).catch(() => window.open(baseUrl + href, '_blank'));
    } else if (ext === 'png' || ext === 'jpg' || ext === 'jpeg') {
        window.open(baseUrl + href, '_blank');
    } else if (ext === 'md') {
        const mdViewer = baseUrl + 'md-viewer.html';
        fetch(mdViewer, {method: 'HEAD'}).then(r => {
            if (r.ok) {
                window.open(mdViewer + '?file=' + encodeURIComponent(rawUrl), '_blank');
            } else {
                window.open(baseUrl + href, '_blank');
            }
        }).catch(() => window.open(baseUrl + href, '_blank'));
    } else if (ext === 'yaml' || ext === 'yml') {
        const yamlViewer = baseUrl + 'yaml-viewer.html';
        fetch(yamlViewer, {method: 'HEAD'}).then(r => {
            if (r.ok) {
                window.open(yamlViewer + '?file=' + encodeURIComponent(rawUrl), '_blank');
            } else {
                window.open(baseUrl + href, '_blank');
            }
        }).catch(() => window.open(baseUrl + href, '_blank'));
    } else if (['xlsx','xls','pptx','ppt','docx','doc'].includes(ext)) {
        // Office files preview via local office-viewer.html (PDF.js on a
        // pre-converted PDF when available, JS fallback otherwise).
        // Falls back to raw download if office-viewer.html isn't deployed.
        const officeViewer = baseUrl + 'office-viewer.html';
        fetch(officeViewer, {method: 'HEAD'}).then(r => {
            if (r.ok) {
                window.open(officeViewer + '?file=' + encodeURIComponent(rawUrl), '_blank');
            } else {
                window.open(baseUrl + href, '_blank');
            }
        }).catch(() => window.open(baseUrl + href, '_blank'));
    } else {
        window.open(baseUrl + href, '_blank');
    }
});

// Register service worker for PWA
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>

</body>
</html>
